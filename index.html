    <style>
      .liquid-blob {
        border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
        background: linear-gradient(135deg, #d27d5e 0%, #565e74 100%);
      }
      .organic-edge {
        clip-path: ellipse(100% 80% at 50% 100%);
      }
      .liquid-progress {
        position: relative;
        overflow: hidden;
      }
      .liquid-progress::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: rgba(255,255,255,0.1);
        border-radius: 38%;
        animation: rotate 10s linear infinite;
      }
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .safe-padding { padding: 0 5vw; }
    </style>
